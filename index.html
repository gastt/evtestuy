<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>EVUruguay — Brújula EV</title>
  <meta name="theme-color" content="#06120d"/>
  <style>
    /* ─── tokens ─────────────────────────────────────────────────── */
    :root{
      --bg:#06120d;
      --surface:#0d2018;
      --panel:rgba(13,32,24,.92);
      --border:rgba(52,211,153,.18);
      --border-hi:rgba(52,211,153,.42);
      --text:#dff5eb;
      --muted:#6ee7b7;
      --dim:rgba(110,231,183,.5);
      --teal:#34d399;
      --green:#10b981;
      --forest:#059669;
      --amber:#f59e0b;
      --red:#f43f5e;
      --blue:#38bdf8;
      --shadow:0 20px 60px rgba(0,0,0,.55);
    }
    [data-theme=light]{
      --bg:#edf7f2;
      --surface:#fff;
      --panel:rgba(255,255,255,.92);
      --border:rgba(5,150,105,.18);
      --border-hi:rgba(5,150,105,.42);
      --text:#0f2419;
      --muted:#064e3b;
      --dim:rgba(6,78,59,.5);
      --teal:#059669;
      --green:#047857;
      --forest:#065f46;
      --shadow:0 12px 40px rgba(5,150,105,.12);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;
      min-height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
      -webkit-font-smoothing:antialiased;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%,rgba(52,211,153,.12),transparent),
        radial-gradient(ellipse 50% 60% at 80% 90%,rgba(16,185,129,.09),transparent),
        var(--bg);
      pointer-events:none;
    }

    .app{
      position:relative;
      z-index:1;
      width:100%;
      min-height:100svh;
      max-width:480px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      padding:
        calc(10px + env(safe-area-inset-top))
        12px
        calc(10px + env(safe-area-inset-bottom));
      gap:10px;
    }

    /* ─── topbar ──────────────────────────────────────────────────── */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      height:44px;
      flex-shrink:0;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
    }
    .brand-logo{
      width:36px;
      height:36px;
      border-radius:11px;
      background:linear-gradient(135deg,var(--teal),var(--forest));
      display:grid;
      place-items:center;
      font-weight:800;
      font-size:.8rem;
      color:#06120d;
      flex-shrink:0;
      box-shadow:0 4px 16px rgba(52,211,153,.35);
    }
    .brand-name{
      font-size:.95rem;
      font-weight:700;
      color:var(--text);
      letter-spacing:-.02em;
    }
    .brand-sub{
      font-size:.58rem;
      font-weight:600;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.1em;
      margin-top:1px;
    }
    .top-right{display:flex;gap:6px;align-items:center}
    .icon-btn{
      height:34px;
      min-width:34px;
      padding:0 10px;
      border-radius:999px;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--muted);
      font-size:.82rem;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(8px);
      transition:border-color .18s, background .18s;
    }
    .icon-btn:active{background:var(--surface)}

    /* ─── start btn ───────────────────────────────────────────────── */
    .start-btn{
      width:100%;
      height:48px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,var(--teal),var(--green));
      color:#06120d;
      font-size:.88rem;
      font-weight:700;
      letter-spacing:.01em;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 8px 24px rgba(52,211,153,.3);
      transition:transform .15s, box-shadow .15s;
      flex-shrink:0;
    }
    .start-btn:active{transform:scale(.98);box-shadow:0 4px 12px rgba(52,211,153,.2)}
    .start-btn svg{width:18px;height:18px}

    /* ─── vehicle select ──────────────────────────────────────────── */
    .controls-row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:8px;
      align-items:center;
      flex-shrink:0;
    }
    .vehicle-select{
      height:40px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--text);
      font-size:.82rem;
      font-weight:600;
      padding:0 10px;
      backdrop-filter:blur(8px);
      outline:none;
      cursor:pointer;
    }
    .mode-btn{
      height:40px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--panel);
      color:var(--muted);
      font-size:.78rem;
      font-weight:600;
      cursor:pointer;
      backdrop-filter:blur(8px);
      white-space:nowrap;
      transition:background .18s, color .18s, border-color .18s;
    }
    .mode-btn.active{
      background:rgba(52,211,153,.15);
      color:var(--teal);
      border-color:var(--border-hi);
    }

    /* ─── compass card ────────────────────────────────────────────── */
    .compass-card{
      flex:1;
      min-height:0;
      border-radius:24px;
      background:var(--panel);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      overflow:hidden;
      position:relative;
      display:flex;
      flex-direction:column;
    }

    /* metrics strip at top of card */
    .metrics-strip{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:1px;
      background:var(--border);
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .metric{
      padding:10px 10px 8px;
      background:var(--panel);
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .metric:first-child{border-radius:0}
    .metric-label{
      font-size:.55rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.09em;
      color:var(--dim);
    }
    .metric-value{
      font-size:1.45rem;
      font-weight:800;
      letter-spacing:-.04em;
      line-height:1;
      color:var(--text);
      transition:color .3s;
    }
    .metric-value.good{color:var(--teal)}
    .metric-value.warn{color:var(--amber)}
    .metric-value.bad{color:var(--red)}
    .metric-sub{
      font-size:.6rem;
      font-weight:600;
      color:var(--muted);
      margin-top:1px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .metric-sub.good{color:var(--green)}
    .metric-sub.warn{color:var(--amber)}
    .metric-sub.bad{color:var(--red)}

    /* compass canvas area */
    .compass-wrap{
      flex:1;
      min-height:0;
      position:relative;
    }
    canvas#compassCanvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }

    /* heading pill overlay */
    .heading-pill{
      position:absolute;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(6,18,13,.72);
      color:var(--muted);
      font-size:.68rem;
      font-weight:600;
      backdrop-filter:blur(10px);
      white-space:nowrap;
      pointer-events:none;
    }
    [data-theme=light] .heading-pill{background:rgba(237,247,242,.82)}
    .heading-pill strong{color:var(--teal);font-weight:700}

    /* ─── readout ─────────────────────────────────────────────────── */
    .readout{
      flex-shrink:0;
      border-radius:18px;
      background:var(--panel);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      padding:12px 14px;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .readout-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .readout-label{
      font-size:.56rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.09em;
      color:var(--dim);
    }
    .readout-status{
      display:flex;
      gap:6px;
    }
    .status-badge{
      font-size:.6rem;
      font-weight:600;
      padding:3px 8px;
      border-radius:999px;
      background:rgba(110,231,183,.08);
      color:var(--dim);
      border:1px solid var(--border);
    }
    .status-badge.ok{background:rgba(52,211,153,.12);color:var(--teal);border-color:rgba(52,211,153,.3)}
    .status-badge.warn{background:rgba(245,158,11,.1);color:var(--amber);border-color:rgba(245,158,11,.3)}
    .readout-text{
      font-size:.78rem;
      line-height:1.4;
      color:var(--muted);
    }

    /* ─── custom panel ────────────────────────────────────────────── */
    .custom-panel{
      display:none;
      flex-shrink:0;
      border-radius:18px;
      background:var(--panel);
      border:1px solid var(--border-hi);
      box-shadow:var(--shadow);
      backdrop-filter:blur(12px);
      padding:12px 14px;
      flex-direction:column;
      gap:10px;
    }
    .custom-panel.visible{display:flex}
    .custom-title{
      font-size:.62rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.09em;
      color:var(--teal);
    }
    .sliders{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px 16px;
    }
    .field label{
      display:flex;
      justify-content:space-between;
      font-size:.6rem;
      font-weight:600;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.06em;
      margin-bottom:4px;
    }
    .field label b{color:var(--teal);font-weight:700}
    input[type=range]{
      width:100%;
      height:20px;
      accent-color:var(--teal);
      cursor:pointer;
    }

    /* ─── toast ───────────────────────────────────────────────────── */
    .toast{
      position:fixed;
      left:50%;
      bottom:calc(16px + env(safe-area-inset-bottom));
      transform:translateX(-50%) translateY(10px);
      width:min(440px,calc(100% - 24px));
      padding:11px 16px;
      border-radius:14px;
      background:rgba(5,150,105,.95);
      color:#fff;
      font-size:.78rem;
      font-weight:600;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .22s, transform .22s;
      z-index:100;
      backdrop-filter:blur(8px);
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ─── responsive ──────────────────────────────────────────────── */
    @media(max-width:360px){
      .metric-value{font-size:1.2rem}
      .metric-sub{font-size:.54rem}
    }
    @media(max-height:680px){
      .app{gap:7px}
      .start-btn{height:40px;font-size:.82rem}
      .metrics-strip .metric{padding:8px 8px 6px}
      .metric-value{font-size:1.25rem}
    }
    @media(max-height:580px){
      .readout .readout-text{display:none}
      .sliders .field:nth-child(3),.sliders .field:nth-child(4){display:none}
      .heading-pill{display:none}
    }
  </style>
</head>
<body>
<div class="app">

  <!-- topbar -->
  <header class="topbar">
    <a class="brand" href="https://evuruguay.com">
      <div class="brand-logo">EV</div>
      <div>
        <div class="brand-name">EVUruguay</div>
        <div class="brand-sub">Brújula de eficiencia</div>
      </div>
    </a>
    <div class="top-right">
      <button class="icon-btn" id="themeBtn" type="button" aria-label="Tema">🌙</button>
      <a class="icon-btn" href="https://evuruguay.com" aria-label="Volver">←</a>
    </div>
  </header>

  <!-- start -->
  <button class="start-btn" id="startBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M16.9 16.9l2.1 2.1M4.9 19.1l2.1-2.1M16.9 7.1l2.1-2.1"/>
    </svg>
    GPS + Brújula + Viento real
  </button>

  <!-- vehicle + mode -->
  <div class="controls-row">
    <select id="vehicleType" class="vehicle-select" aria-label="Tipo de vehículo">
      <option value="hatch">🚗 Hatchback</option>
      <option value="sedan">🚙 Sedán</option>
      <option value="suv" selected>🚐 SUV</option>
      <option value="pickup">🛻 Pickup</option>
    </select>
    <button class="mode-btn" id="customBtn" type="button">⚙️ Manual</button>
  </div>

  <!-- compass card -->
  <div class="compass-card">
    <!-- metrics strip -->
    <div class="metrics-strip">
      <div class="metric">
        <div class="metric-label">Eficiencia</div>
        <div class="metric-value" id="effValue">--%</div>
        <div class="metric-sub" id="effLabel">Esperando</div>
      </div>
      <div class="metric">
        <div class="metric-label">Viento</div>
        <div class="metric-value" id="windValue">-- <span style="font-size:.7rem;font-weight:600;color:var(--dim)">km/h</span></div>
        <div class="metric-sub" id="windLabel">sin datos</div>
      </div>
      <div class="metric">
        <div class="metric-label">Temp.</div>
        <div class="metric-value" id="tempValue">-- <span style="font-size:.7rem;font-weight:600;color:var(--dim)">°C</span></div>
        <div class="metric-sub" id="tempLabel">sin datos</div>
      </div>
    </div>

    <!-- canvas compass -->
    <div class="compass-wrap">
      <canvas id="compassCanvas"></canvas>
      <div class="heading-pill">
        <span id="headingHuman">Norte · 0°</span>
        <strong id="speedHuman">-- km/h</strong>
      </div>
    </div>
  </div>

  <!-- readout -->
  <div class="readout">
    <div class="readout-head">
      <span class="readout-label">Lectura</span>
      <div class="readout-status">
        <span class="status-badge" id="gpsStatus">GPS: --</span>
        <span class="status-badge" id="weatherStatus">Clima: --</span>
      </div>
    </div>
    <div class="readout-text" id="explanation">Tocá el botón de arriba para activar GPS y viento real. Se calcularán rumbo, velocidad y eficiencia aerodinámica en tiempo real.</div>
  </div>

  <!-- custom panel -->
  <div class="custom-panel" id="customPanel">
    <div class="custom-title">Simulador manual</div>
    <div class="sliders">
      <div class="field">
        <label for="carHeading"><span>Rumbo EV</span><b id="carHeadingVal">35</b>°</label>
        <input id="carHeading" type="range" min="0" max="359" value="35"/>
      </div>
      <div class="field">
        <label for="windDirection"><span>Viento desde</span><b id="windDirectionVal">225</b>°</label>
        <input id="windDirection" type="range" min="0" max="359" value="225"/>
      </div>
      <div class="field">
        <label for="windSpeed"><span>Vel. viento</span><b id="windSpeedVal">28</b> km/h</label>
        <input id="windSpeed" type="range" min="0" max="90" value="28"/>
      </div>
      <div class="field">
        <label for="carSpeed"><span>Vel. EV</span><b id="carSpeedVal">80</b> km/h</label>
        <input id="carSpeed" type="range" min="0" max="140" value="80"/>
      </div>
    </div>
  </div>

</div><!-- .app -->

<div class="toast" id="toast"></div>

<script>
// ─── helpers ─────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const carHeadingEl=$("carHeading"),windDirEl=$("windDirection"),windSpeedEl=$("windSpeed"),carSpeedEl=$("carSpeed"),vehicleTypeEl=$("vehicleType");

function normDeg(d){return((d%360)+360)%360}
function shortAngle(a,b){let d=Math.abs(normDeg(a)-normDeg(b))%360;return d>180?360-d:d}
function toCardinal(deg){return["N","NE","E","SE","S","SO","O","NO"][Math.round(normDeg(deg)/45)%8]}
function bearingBetween(la1,lo1,la2,lo2){
  const r=d=>d*Math.PI/180,D=r=>r*180/Math.PI;
  const y=Math.sin(r(lo2-lo1))*Math.cos(r(la2)),x=Math.cos(r(la1))*Math.sin(r(la2))-Math.sin(r(la1))*Math.cos(r(la2))*Math.cos(r(lo2-lo1));
  return normDeg(D(Math.atan2(y,x)));
}
function distMeters(la1,lo1,la2,lo2){
  const R=6371000,r=d=>d*Math.PI/180,dLa=r(la2-la1),dLo=r(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(dLo/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function showToast(msg){
  const t=$("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3800);
}

// ─── state ────────────────────────────────────────────────────────────────
let watchId=null,lastPos=null,lastWeatherAt=0;
let customMode=false,hasGps=false,hasWeather=false;
let currentTemp=null,deviceHeading=null,hasCompass=false;
let lastLat=null,lastLon=null;

// Internal state (used for canvas draw and computation)
let state={heading:35,windFrom:225,windKmh:0,speedKmh:0,vehicle:"suv"};

// ─── vehicle images ───────────────────────────────────────────────────────
const vehicleImgSrc={
  hatch:"assets/vehiculos/hatchback_top_view_200x200.png",
  sedan:"assets/vehiculos/sedan_top_view_200x200.png",
  suv:  "assets/vehiculos/suv_top_view_200x200.png",
  pickup:"assets/vehiculos/pickup_top_view_200x200.png"
};
const vehicleImgSize={
  hatch:{w:132,h:132},sedan:{w:136,h:136},suv:{w:142,h:142},pickup:{w:148,h:148}
};
let vehicleImg=new Image();
function loadVehicleImg(key){
  const img=new Image();
  img.onload=()=>{vehicleImg=img};
  img.onerror=()=>{vehicleImg=null};
  img.src=vehicleImgSrc[key]||vehicleImgSrc.suv;
}
loadVehicleImg("suv");

// ─── vehicle params ───────────────────────────────────────────────────────
const VP={
  hatch:{mass:1450,cdA:.60,crr:.010,aux:.8},
  sedan:{mass:1700,cdA:.56,crr:.010,aux:.8},
  suv:  {mass:1900,cdA:.72,crr:.011,aux:.9},
  pickup:{mass:2250,cdA:.95,crr:.012,aux:1.0}
};

// ─── physics ──────────────────────────────────────────────────────────────
function calcImpact(heading,windFrom,windKmh,speedKmh,vehicleKey){
  const p=VP[vehicleKey]||VP.suv;
  const v=Math.max(0,speedKmh/3.6);
  const w=Math.max(0,windKmh/3.6);

  // angle between vehicle heading and wind direction
  // windFrom = direction wind is coming FROM
  // wind travels from windFrom toward (windFrom+180)
  const windTo=normDeg(windFrom+180); // direction wind is moving toward
  const angleTo=shortAngle(heading,windTo); // angle between car heading and wind movement direction
  const rad=angleTo*Math.PI/180;

  // relative air speed: v_rel² = v² + w² - 2vw·cos(angle between car and wind directions)
  const vAir=Math.sqrt(Math.max(0,v*v+w*w-2*v*w*Math.cos(rad)));

  const rho=1.225,g=9.81,eff=0.90;
  const pDrag0=.5*rho*p.cdA*v*v*v/1000;
  const pDragW=.5*rho*p.cdA*vAir*vAir*v/1000;
  const pRoll=p.mass*g*p.crr*v/1000;
  const pAux=p.aux;

  const base=(pDrag0+pRoll+pAux)/eff;
  const actual=(pDragW+pRoll+pAux)/eff;
  let efficiency=base>0?(base/actual)*100:100;
  efficiency=Math.max(60,Math.min(120,Math.round(efficiency)));

  // Relative direction label
  const relAngle=((heading-(windFrom))%360+360)%360; // how wind hits the car
  const absRel=Math.min(relAngle,360-relAngle);
  let relText;
  if(absRel<30) relText="Viento frontal";
  else if(absRel<75) relText="Frontal oblicuo";
  else if(absRel<115) relText="Viento lateral";
  else if(absRel<150) relText="Cola lateral";
  else relText="Viento de cola";

  const consumDelta=actual>0?((actual/base)-1)*100:0;
  return{efficiency,impact:efficiency-100,relText,vAirKmh:vAir*3.6,consumDelta,windTo};
}

function calcThermal(temp){
  if(!Number.isFinite(temp))return{score:null,label:"sin temp.",cls:"warn"};
  if(temp>=18&&temp<=28) return{score:100,label:"Temp. óptima",cls:"good"};
  if(temp>=12&&temp<18)  return{score:96, label:"Leve frío",cls:"warn"};
  if(temp>=5&&temp<12)   return{score:91, label:"Frío mod.",cls:"warn"};
  if(temp>=0&&temp<5)    return{score:86, label:"Frío",cls:"bad"};
  if(temp<0)             return{score:78, label:"Frío ext.",cls:"bad"};
  if(temp>28&&temp<=34)  return{score:96, label:"Calor leve",cls:"warn"};
  if(temp>34&&temp<=40)  return{score:90, label:"Calor",cls:"warn"};
  return{score:84,label:"Calor ext.",cls:"bad"};
}

// ─── canvas compass ────────────────────────────────────────────────────────
const canvas=$("compassCanvas");
const ctx=canvas.getContext("2d");
let animId=null;
let windAnimOffset=0;

function resize(){
  const wrap=canvas.parentElement;
  const w=wrap.clientWidth,h=wrap.clientHeight;
  const dpr=window.devicePixelRatio||1;
  canvas.width=w*dpr;
  canvas.height=h*dpr;
  canvas.style.width=w+"px";
  canvas.style.height=h+"px";
  ctx.scale(dpr,dpr);
}

function getColors(){
  const s=getComputedStyle(document.documentElement);
  return{
    teal:s.getPropertyValue("--teal").trim()||"#34d399",
    muted:s.getPropertyValue("--muted").trim()||"#6ee7b7",
    dim:s.getPropertyValue("--dim").trim()||"rgba(110,231,183,.5)",
    text:s.getPropertyValue("--text").trim()||"#dff5eb",
    amber:s.getPropertyValue("--amber").trim()||"#f59e0b",
    red:s.getPropertyValue("--red").trim()||"#f43f5e",
    bg:s.getPropertyValue("--surface").trim()||"#0d2018",
    forest:s.getPropertyValue("--forest").trim()||"#059669",
  };
}

function drawCompass(heading,windFrom,windKmh,speedKmh){
  const w=canvas.clientWidth,h=canvas.clientHeight;
  if(w===0||h===0)return;
  ctx.clearRect(0,0,w,h);

  const cx=w/2,cy=h/2;
  const R=Math.min(w,h)*0.42;
  const C=getColors();
  const isDark=document.documentElement.getAttribute("data-theme")==="dark";

  // ─────────────────────────────────────────────────────────────────
  // LÓGICA: el vehículo siempre apunta hacia ARRIBA (hacia la pantalla).
  // La ROSA (ticks, cardinales, viento) GIRA el ángulo -heading para
  // que el norte quede en la posición que le corresponde respecto al auto.
  // Así: si el auto va al norte → la N queda arriba.
  //       si el auto va al este  → la N queda a la izquierda.
  // ─────────────────────────────────────────────────────────────────
  const roseAngle = -heading * Math.PI / 180; // rotación de la rosa

  // ── BLOQUE ROTADO: todo lo que pertenece a la rosa ──
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(roseAngle);

  // outer ring (círculo, no se ve diferente rotado pero lo mantenemos en bloque)
  ctx.beginPath();
  ctx.arc(0,0,R,0,Math.PI*2);
  ctx.strokeStyle=isDark?"rgba(52,211,153,.22)":"rgba(5,150,105,.2)";
  ctx.lineWidth=1.5;
  ctx.stroke();

  // inner rings dashed
  [.68,.38].forEach(f=>{
    ctx.beginPath();
    ctx.arc(0,0,R*f,0,Math.PI*2);
    ctx.setLineDash([4,6]);
    ctx.strokeStyle=isDark?"rgba(52,211,153,.12)":"rgba(5,150,105,.14)";
    ctx.lineWidth=1;
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // ticks de grados (rotan con la rosa)
  for(let i=0;i<360;i+=10){
    const major=i%90===0;
    const mid=i%30===0;
    const a=(i-90)*Math.PI/180; // 0° = N = arriba en coordenadas de la rosa
    const r1=major?R-16:mid?R-10:R-6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
    ctx.lineTo(Math.cos(a)*R,Math.sin(a)*R);
    ctx.strokeStyle=major?C.teal:mid?C.dim:"rgba(52,211,153,.18)";
    ctx.lineWidth=major?1.5:1;
    ctx.stroke();
  }

  // cardinales (rotan con la rosa — así N va a donde corresponde)
  [["N",0],["E",90],["S",180],["O",270]].forEach(([lbl,deg])=>{
    const a=(deg-90)*Math.PI/180;
    const rL=R-30;
    ctx.save();
    ctx.translate(Math.cos(a)*rL,Math.sin(a)*rL);
    ctx.rotate(-roseAngle); // contra-rotar el texto para que siempre sea legible
    ctx.font=`700 ${lbl==="N"?13:11}px -apple-system,sans-serif`;
    ctx.fillStyle=lbl==="N"?C.teal:C.muted;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText(lbl,0,0);
    ctx.restore();
  });

  // ── viento (dentro del bloque rotado de la rosa) ──
  if(windKmh>1){
    // Las líneas de viento se dibujan en la dirección windFrom (en coordenadas de la rosa)
    // windFrom es absoluto (geográfico). En la rosa rotada, windFrom ya está mapeado.
    const windTo=normDeg(windFrom+180);
    const windCanvasAngle=(windTo-90)*Math.PI/180; // hacia dónde se mueve el viento en la rosa

    ctx.save();
    ctx.rotate(windCanvasAngle); // dentro del bloque ya rotado de la rosa

    const count=Math.min(20,Math.max(6,Math.round(windKmh/3.5)));
    const alpha=Math.min(.75,windKmh/60+.2);
    windAnimOffset=(windAnimOffset+windKmh/2000)%1;

    for(let i=0;i<count;i++){
      const spread=R*.85;
      const xOff=(((i+.5)/count)-.5)*spread*2;
      if(Math.abs(xOff)>R*.88)continue;
      const phase=((i/count)+windAnimOffset)%1;
      const lineLen=R*(.45+windKmh/120);
      const startY=-R*.98+(phase*R*1.96);

      const g=ctx.createLinearGradient(xOff,startY,xOff,startY+lineLen);
      g.addColorStop(0,"transparent");
      g.addColorStop(.3,`rgba(52,211,153,${alpha*.7})`);
      g.addColorStop(.85,`rgba(52,211,153,${alpha})`);
      g.addColorStop(1,"transparent");
      ctx.beginPath();
      ctx.moveTo(xOff,startY);
      ctx.lineTo(xOff,startY+lineLen);
      ctx.strokeStyle=g;
      ctx.lineWidth=windKmh>30?2:1.5;
      ctx.stroke();

      const ay=startY+lineLen*.75;
      ctx.beginPath();
      ctx.moveTo(xOff,ay+8);
      ctx.lineTo(xOff-4,ay);
      ctx.lineTo(xOff+4,ay);
      ctx.closePath();
      ctx.fillStyle=`rgba(52,211,153,${alpha*.8})`;
      ctx.fill();
    }
    ctx.restore();

    // flecha de dirección del viento sobre el anillo exterior (en coordenadas de rosa)
    const windFromCanvasAngle=(windFrom-90)*Math.PI/180;
    const arrowR=R+12,arrowTip=R-8;
    ctx.beginPath();
    ctx.moveTo(Math.cos(windFromCanvasAngle)*arrowR,Math.sin(windFromCanvasAngle)*arrowR);
    ctx.lineTo(Math.cos(windFromCanvasAngle)*arrowTip,Math.sin(windFromCanvasAngle)*arrowTip);
    ctx.strokeStyle=isDark?"rgba(56,189,248,.8)":"rgba(2,132,199,.8)";
    ctx.lineWidth=2.5;
    ctx.setLineDash([4,3]);
    ctx.stroke();
    ctx.setLineDash([]);
    // punta de flecha
    const tipX=Math.cos(windFromCanvasAngle)*arrowTip,tipY=Math.sin(windFromCanvasAngle)*arrowTip;
    const perp=windFromCanvasAngle+Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(tipX,tipY);
    ctx.lineTo(tipX+Math.cos(perp)*5+Math.cos(windFromCanvasAngle+Math.PI)*9,
               tipY+Math.sin(perp)*5+Math.sin(windFromCanvasAngle+Math.PI)*9);
    ctx.lineTo(tipX-Math.cos(perp)*5+Math.cos(windFromCanvasAngle+Math.PI)*9,
               tipY-Math.sin(perp)*5+Math.sin(windFromCanvasAngle+Math.PI)*9);
    ctx.closePath();
    ctx.fillStyle=isDark?"rgba(56,189,248,.8)":"rgba(2,132,199,.8)";
    ctx.fill();
    // etiqueta "VIENTO" — contra-rotar para que sea legible
    const lblR=R+28;
    const lblX=Math.cos(windFromCanvasAngle)*lblR,lblY=Math.sin(windFromCanvasAngle)*lblR;
    ctx.save();
    ctx.translate(lblX,lblY);
    ctx.rotate(-roseAngle);
    ctx.font="600 9px -apple-system,sans-serif";
    ctx.fillStyle=isDark?"rgba(56,189,248,.9)":"rgba(2,132,199,.9)";
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText("VIENTO",0,0);
    ctx.restore();
  }

  ctx.restore(); // fin bloque rotado de la rosa

  // ── BLOQUE FIJO: vehículo siempre apunta arriba ──
  ctx.save();
  ctx.translate(cx,cy);
  // sin rotación — el vehículo apunta hacia arriba (norte de pantalla = dirección de marcha)
  const imgSize=vehicleImgSize[vehicleTypeEl.value||"suv"]||{w:142,h:142};
  if(vehicleImg&&vehicleImg.complete&&vehicleImg.naturalWidth>0){
    ctx.drawImage(vehicleImg,-imgSize.w/2,-imgSize.h/2,imgSize.w,imgSize.h);
  }
  ctx.restore();

  // ── BLOQUE FIJO: triángulo de "frente" siempre arriba ──
  ctx.save();
  ctx.translate(cx,cy);
  const fR=R*.93;
  ctx.beginPath();
  ctx.moveTo(0,-fR);
  ctx.lineTo(-5,-fR+10);
  ctx.lineTo(5,-fR+10);
  ctx.closePath();
  ctx.fillStyle=C.teal;
  ctx.fill();
  ctx.restore();

  // ── efficiency arc (fijo, siempre arranca arriba) ──
  if(speedKmh>=5){
    const d=calcImpact(heading,windFrom,windKmh,speedKmh,vehicleTypeEl.value);
    const eff=d.efficiency;
    const arcColor=eff>=100?C.teal:eff>=90?C.amber:C.red;
    const arcR=R*.54;
    const arcEnd=-Math.PI/2+(2*Math.PI*(Math.min(eff,115)/115));
    ctx.save();
    ctx.translate(cx,cy);
    ctx.beginPath();
    ctx.arc(0,0,arcR,0,Math.PI*2);
    ctx.strokeStyle=isDark?"rgba(255,255,255,.06)":"rgba(0,0,0,.06)";
    ctx.lineWidth=5;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0,0,arcR,-Math.PI/2,arcEnd);
    ctx.strokeStyle=arcColor;
    ctx.lineWidth=5;
    ctx.lineCap="round";
    ctx.stroke();
    ctx.restore();
  }
}

function animate(){
  const s=state;
  drawCompass(s.heading,s.windFrom,s.windKmh,s.speedKmh);
  animId=requestAnimationFrame(animate);
}

// ─── metrics update ───────────────────────────────────────────────────────
function updateUI(){
  const s=state;
  const waiting=!customMode&&!hasGps&&!hasWeather;
  const d=calcImpact(s.heading,s.windFrom,s.windKmh,s.speedKmh,s.vehicle);
  const thermal=calcThermal(currentTemp);

  // efficiency metric
  const effEl=$("effValue");
  if(waiting||s.speedKmh<5){
    effEl.textContent="--";
    effEl.className="metric-value";
    $("effLabel").textContent=s.speedKmh<5&&(customMode||hasGps)?"<12 km/h":"Esperando";
    $("effLabel").className="metric-sub warn";
  }else{
    effEl.textContent=d.efficiency+"%";
    const cls=d.efficiency>=100?"good":d.efficiency>=90?"warn":"bad";
    effEl.className="metric-value "+cls;
    $("effLabel").textContent=d.relText;
    $("effLabel").className="metric-sub "+cls;
  }

  // wind metric
  if(!customMode&&!hasWeather){
    $("windValue").innerHTML='-- <span style="font-size:.7rem;font-weight:600;color:var(--dim)">km/h</span>';
    $("windLabel").textContent="sin datos";
    $("windLabel").className="metric-sub";
  }else{
    // wColor unused but calculated for future use
    $("windValue").innerHTML=`${Math.round(s.windKmh)} <span style="font-size:.7rem;font-weight:600;color:var(--dim)">km/h</span>`;
    $("windLabel").textContent=`${toCardinal(s.windFrom)} · ${Math.round(s.windFrom)}°`;
    $("windLabel").className="metric-sub";
  }

  // temp metric
  if(!customMode&&!hasWeather||currentTemp===null){
    $("tempValue").innerHTML='-- <span style="font-size:.7rem;font-weight:600;color:var(--dim)">°C</span>';
    $("tempLabel").textContent="sin datos";
    $("tempLabel").className="metric-sub";
  }else{
    $("tempValue").innerHTML=`${currentTemp} <span style="font-size:.7rem;font-weight:600;color:var(--dim)">°C</span>`;
    $("tempLabel").textContent=thermal.label;
    $("tempLabel").className="metric-sub "+thermal.cls;
  }

  // heading pill
  $("headingHuman").textContent=`${toCardinal(s.heading)} · ${Math.round(s.heading)}°`;
  $("speedHuman").textContent=(customMode||hasGps)?`${Math.round(s.speedKmh)} km/h`:"-- km/h";

  // explanation
  let exp="";
  if(!customMode&&!hasGps&&!hasWeather){
    exp="Tocá el botón para activar GPS y viento real. La brújula calculará eficiencia aerodinámica según tu rumbo, velocidad y el viento local.";
  }else if(!customMode&&!hasGps){
    exp="GPS solicitado. Permití ubicación y movete unos metros para que el sistema calcule rumbo y velocidad real.";
  }else if(!customMode&&!hasWeather){
    exp="GPS activo. Consultando clima en Open-Meteo, reintentá si demora.";
  }else if(s.speedKmh<12){
    exp="Velocidad muy baja. Movete más rápido para que el GPS calcule rumbo real con precisión.";
  }else if(d.efficiency>=105){
    exp=`${d.relText}: el viento te ayuda. Velocidad relativa del aire ${Math.round(d.vAirKmh)} km/h → eficiencia +${Math.round(d.impact)}%. ${currentTemp!==null&&thermal.score!==null&&thermal.score<97?thermal.label+": "+currentTemp+"°C puede afectar batería.":""}`;
  }else if(d.efficiency>=98){
    exp=`${d.relText}: impacto casi neutro. Eficiencia estimada ${d.efficiency}%.`;
  }else if(d.efficiency<85){
    exp=`⚠️ ${d.relText}: viento muy desfavorable. Eficiencia ${d.efficiency}%, consumo +${Math.round(d.consumDelta)}%. Bajar velocidad ayuda mucho (la resistencia crece con el cuadrado de la velocidad del aire).`;
  }else{
    exp=`${d.relText}. Eficiencia estimada ${d.efficiency}%, consumo +${Math.round(d.consumDelta)}%.`;
  }
  $("explanation").textContent=exp;
}

// ─── GPS + weather ────────────────────────────────────────────────────────
async function fetchWeather(lat,lon,force=false){
  const now=Date.now();
  if(!force&&now-lastWeatherAt<5*60*1000)return;
  lastWeatherAt=now;
  $("weatherStatus").textContent="Clima: …";
  $("weatherStatus").className="status-badge";
  const url=new URL("https://api.open-meteo.com/v1/forecast");
  url.searchParams.set("latitude",lat);
  url.searchParams.set("longitude",lon);
  url.searchParams.set("current","wind_speed_10m,wind_direction_10m,wind_gusts_10m,temperature_2m");
  url.searchParams.set("wind_speed_unit","kmh");
  url.searchParams.set("timezone","auto");
  try{
    const res=await fetch(url.toString(),{cache:"no-store"});
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();
    const c=data.current||{};
    const spd=Number(c.wind_speed_10m);
    const from=Number(c.wind_direction_10m); // Open-Meteo gives direction wind is coming FROM
    const gust=Number(c.wind_gusts_10m);
    const temp=Number(c.temperature_2m);
    if(Number.isFinite(spd)){
      windSpeedEl.value=Math.round(spd);
      state.windKmh=Math.round(spd);
    }
    if(Number.isFinite(from)){
      // Open-Meteo wind_direction_10m = direction FROM which wind blows
      windDirEl.value=Math.round(normDeg(from)); // store as "from"
      state.windFrom=Math.round(normDeg(from));
    }
    if(Number.isFinite(temp))currentTemp=Math.round(temp);
    hasWeather=true;
    $("weatherStatus").textContent=`Clima: ${Math.round(spd)} km/h${Number.isFinite(gust)?" · r "+Math.round(gust):""}`;
    $("weatherStatus").className="status-badge ok";
    updateUI();
  }catch(e){
    hasWeather=false;currentTemp=null;
    $("weatherStatus").textContent="Clima: error";
    $("weatherStatus").className="status-badge warn";
    showToast("No se pudo consultar Open-Meteo. Verificá conexión.");
  }
}

async function startCompass(){
  try{
    if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){
      const perm=await DeviceOrientationEvent.requestPermission();
      if(perm!=="granted"){hasCompass=false;return}
    }
    window.addEventListener("deviceorientation",ev=>{
      let h=null;
      if(typeof ev.webkitCompassHeading==="number"&&Number.isFinite(ev.webkitCompassHeading)){
        h=ev.webkitCompassHeading;
      }else if(typeof ev.alpha==="number"&&Number.isFinite(ev.alpha)){
        h=360-ev.alpha;
      }
      if(h!==null){deviceHeading=normDeg(h);hasCompass=true;}
    },true);
  }catch(e){hasCompass=false}
}

function startGps(){
  if(!navigator.geolocation){showToast("Este navegador no soporta geolocalización.");return}
  showToast("Solicitando GPS y brújula…");
  startCompass().catch(()=>{hasCompass=false});
  $("gpsStatus").textContent="GPS: solicitando…";
  $("gpsStatus").className="status-badge warn";
  if(lastLat!==null&&lastLon!==null)fetchWeather(lastLat,lastLon,true);
  if(watchId!==null)navigator.geolocation.clearWatch(watchId);
  watchId=navigator.geolocation.watchPosition(pos=>{
    const c=pos.coords;
    hasGps=true;
    $("gpsStatus").textContent=`GPS: ±${Math.round(c.accuracy||0)}m`;
    $("gpsStatus").className="status-badge ok";
    const nowMs=Date.now();
    let kmh=null;
    if(typeof c.speed==="number"&&Number.isFinite(c.speed)){
      kmh=Math.max(0,Math.round(c.speed*3.6));
    }else if(lastPos){
      const m=distMeters(lastPos.lat,lastPos.lon,c.latitude,c.longitude);
      const sec=Math.max(.5,(nowMs-lastPos.t)/1000);
      const est=Math.round((m/sec)*3.6);
      if(Number.isFinite(est))kmh=Math.max(0,Math.min(140,est));
    }
    if(kmh!==null){
      carSpeedEl.value=String(Math.min(140,kmh));
      state.speedKmh=Math.min(140,kmh);
    }else{
      state.speedKmh=0;
    }
    if(kmh!==null&&kmh>=3){
      if(typeof c.heading==="number"&&Number.isFinite(c.heading)&&c.heading>=0){
        const h=Math.round(c.heading);
        carHeadingEl.value=h;
        state.heading=h;
      }else if(lastPos){
        const m=distMeters(lastPos.lat,lastPos.lon,c.latitude,c.longitude);
        if(m>=3){
          const h=Math.round(bearingBetween(lastPos.lat,lastPos.lon,c.latitude,c.longitude));
          carHeadingEl.value=h;
          state.heading=h;
        }
      }
    }
    lastLat=c.latitude;lastLon=c.longitude;
    lastPos={lat:c.latitude,lon:c.longitude,t:nowMs};
    fetchWeather(c.latitude,c.longitude);
    updateUI();
  },err=>{
    hasGps=false;
    $("gpsStatus").textContent="GPS: sin permiso";
    $("gpsStatus").className="status-badge warn";
    showToast("No se pudo acceder al GPS: "+err.message);
  },{enableHighAccuracy:true,maximumAge:1500,timeout:14000});
}

// ─── event listeners ──────────────────────────────────────────────────────
$("startBtn").addEventListener("click",startGps);

$("customBtn").addEventListener("click",()=>{
  customMode=!customMode;
  $("customPanel").classList.toggle("visible",customMode);
  $("customBtn").classList.toggle("active",customMode);
  $("customBtn").textContent=customMode?"✅ Manual":"⚙️ Manual";
  if(customMode){
    // Initialize state from sliders when entering custom mode
    state.heading=Number(carHeadingEl.value);
    state.windFrom=Number(windDirEl.value);
    state.windKmh=Number(windSpeedEl.value);
    state.speedKmh=Number(carSpeedEl.value);
  }
  showToast(customMode?"Modo manual: usá los sliders para simular.":"Modo real: GPS y viento meteorológico.");
  updateUI();
});

$("themeBtn").addEventListener("click",()=>{
  const root=document.documentElement;
  const next=root.getAttribute("data-theme")==="dark"?"light":"dark";
  root.setAttribute("data-theme",next);
  $("themeBtn").textContent=next==="dark"?"🌙":"☀️";
  document.querySelector("meta[name=theme-color]").setAttribute("content",next==="dark"?"#06120d":"#edf7f2");
});

vehicleTypeEl.addEventListener("change",()=>{
  state.vehicle=vehicleTypeEl.value;
  loadVehicleImg(vehicleTypeEl.value);
  updateUI();
});

// sliders (custom mode)
function onSlider(){
  if(!customMode)return;
  state.heading=Number(carHeadingEl.value);
  state.windFrom=Number(windDirEl.value);
  state.windKmh=Number(windSpeedEl.value);
  state.speedKmh=Number(carSpeedEl.value);
  $("carHeadingVal").textContent=Math.round(state.heading);
  $("windDirectionVal").textContent=Math.round(state.windFrom);
  $("windSpeedVal").textContent=Math.round(state.windKmh);
  $("carSpeedVal").textContent=Math.round(state.speedKmh);
  updateUI();
}
[carHeadingEl,windDirEl,windSpeedEl,carSpeedEl].forEach(el=>{
  el.addEventListener("input",onSlider);
  el.addEventListener("change",onSlider);
});

// compass heading from device
setInterval(()=>{
  if(hasCompass&&Number.isFinite(deviceHeading)&&!customMode&&hasGps){
    // deviceHeading = direction device faces. For car heading, GPS heading is more accurate.
    // We use device compass only if GPS heading unavailable (low speed).
    if(state.speedKmh<8){
      state.heading=normDeg(deviceHeading);
    }
  }
},250);

// ─── resize & init ────────────────────────────────────────────────────────
window.addEventListener("resize",()=>{resize();});
new ResizeObserver(()=>{resize();}).observe($("compassCanvas").parentElement);

// Boot
resize();
// Default custom mode state to show something useful
state={heading:35,windFrom:225,windKmh:28,speedKmh:80,vehicle:"suv"};
updateUI();
animate();
</script>
